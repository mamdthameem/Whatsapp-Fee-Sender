<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Receipt Portal | SSEC</title>
    <link rel="icon" type="image/jpeg" href="assets/ssec-logo.jpg">
    <link rel="apple-touch-icon" href="assets/ssec-logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red: #c62828;
            --red-light: #e53935;
            --gold: #ffc107;
            --wa-green: #25D366;
            --wa-green-dark: #1ea952;
            --dark: #0C0C14;
            --dark-2: #15151F;
            --dark-3: #1E1E2C;
            --white: #ffffff;
            --grey-50: #FAFAFA;
            --grey-100: #F4F4F6;
            --grey-200: #E4E4E8;
            --grey-400: #A0A0AA;
            --grey-600: #5C5C6E;
            --grey-800: #1A1A2E;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.16);
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* ── SPLIT LAYOUT ── */
        .split {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ══════════════════════════════
           LEFT PANEL
        ══════════════════════════════ */
        .left {
            width: 42%;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem 2.75rem;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Ambient glow */
        .left::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 25% 15%, rgba(198,40,40,0.14) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 85%, rgba(255,193,7,0.07) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Decorative ring bottom-right */
        .left::after {
            content: '';
            position: absolute;
            bottom: -100px;
            right: -100px;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.04);
            box-shadow: 0 0 0 60px rgba(255,255,255,0.02);
            pointer-events: none;
        }

        .left-top {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 2.75rem;
        }

        /* Logo */
        .logo-img {
            height: 68px;
            width: auto;
            max-width: 260px;
            object-fit: contain;
            filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
        }

        /* Tagline */
        .tagline-block {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .accent-rule {
            width: 44px;
            height: 3px;
            background: linear-gradient(90deg, var(--red), var(--gold));
            border-radius: 2px;
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 3vw, 2.75rem);
            font-weight: 700;
            color: var(--white);
            line-height: 1.12;
            letter-spacing: -0.5px;
        }

        .tagline em {
            font-style: italic;
            font-weight: 600;
            color: var(--gold);
        }

        .tagline-sub {
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: rgba(255,255,255,0.3);
            margin-top: 0.25rem;
        }

        /* Contact section */
        .contact-section {
            position: relative;
            z-index: 1;
        }

        .contact-eyebrow {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 1rem;
        }

        .contact-items {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .contact-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: rgba(255,255,255,0.55);
            font-size: 0.78rem;
            transition: color 0.2s ease;
        }

        .contact-link:hover { color: var(--white); }

        .contact-icon {
            width: 28px;
            height: 28px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: var(--gold);
            flex-shrink: 0;
            transition: background 0.2s ease;
        }

        .contact-link:hover .contact-icon {
            background: rgba(255,193,7,0.12);
        }

        /* ══════════════════════════════
           RIGHT PANEL
        ══════════════════════════════ */
        .right {
            flex: 1;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 4.5rem;
            overflow-y: auto;
        }

        .form-wrapper {
            width: 100%;
            max-width: 400px;
        }

        /* Form header */
        .form-header {
            margin-bottom: 2.5rem;
        }

        .form-eyebrow {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--red);
            margin-bottom: 0.6rem;
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--grey-800);
            line-height: 1.15;
        }

        /* Form groups */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .field-label {
            display: block;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--grey-600);
            margin-bottom: 0.6rem;
        }

        /* Phone input with +91 prefix */
        .phone-wrap {
            display: flex;
            border: 1.5px solid var(--grey-200);
            border-radius: 10px;
            overflow: hidden;
            background: var(--white);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .phone-wrap:focus-within {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(198,40,40,0.08);
        }

        .phone-prefix {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0 1rem;
            background: var(--grey-100);
            border-right: 1.5px solid var(--grey-200);
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--grey-600);
            white-space: nowrap;
            user-select: none;
            flex-shrink: 0;
        }

        .form-input {
            flex: 1;
            padding: 0.875rem 1rem;
            border: none;
            outline: none;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            color: var(--grey-800);
            background: transparent;
            min-width: 0;
        }

        .form-input::placeholder {
            color: var(--grey-400);
            font-weight: 300;
        }

        /* File upload zone */
        .file-zone {
            position: relative;
            border: 1.5px dashed var(--grey-200);
            border-radius: 10px;
            padding: 2rem 1rem;
            text-align: center;
            background: var(--grey-50);
            cursor: pointer;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .file-zone:hover {
            border-color: var(--red);
            background: rgba(198,40,40,0.02);
        }

        .file-zone.dragover {
            border-color: var(--wa-green);
            border-style: solid;
            background: rgba(37,211,102,0.04);
        }

        .file-input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .zone-content { pointer-events: none; }

        .zone-icon {
            font-size: 1.8rem;
            margin-bottom: 0.6rem;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .icon-default { color: var(--grey-400); display: block; }
        .icon-drag    { color: var(--wa-green); display: none; }

        .file-zone.dragover .icon-default { display: none; }
        .file-zone.dragover .icon-drag {
            display: block;
            animation: popIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from { transform: scale(0.6); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .zone-text {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--grey-600);
            margin-bottom: 0.2rem;
        }

        .zone-hint {
            font-size: 0.7rem;
            color: var(--grey-400);
        }

        .file-zone.dragover .zone-text { color: var(--wa-green-dark); }

        /* File selected pill */
        .file-selected {
            display: none;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 0.9rem;
            background: #F0FFF4;
            border: 1px solid #C6F6D5;
            border-radius: 8px;
            margin-top: 0.65rem;
        }

        .file-selected.active { display: flex; }

        .file-selected .pdf-icon {
            font-size: 1.2rem;
            color: var(--red);
            flex-shrink: 0;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--grey-800);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: 0.68rem;
            color: var(--grey-400);
        }

        .remove-file {
            background: none;
            border: none;
            color: var(--grey-400);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0.2rem;
            border-radius: 4px;
            transition: color 0.2s ease;
            flex-shrink: 0;
            line-height: 1;
        }

        .remove-file:hover { color: var(--red); }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--red), var(--red-light));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        /* WhatsApp green overlay on hover */
        .submit-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--wa-green), var(--wa-green-dark));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .submit-btn:hover:not(:disabled)::after { opacity: 1; }

        .submit-btn span,
        .submit-btn i {
            position: relative;
            z-index: 1;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(37,211,102,0.32);
        }

        .submit-btn:active:not(:disabled) { transform: translateY(0); }

        .submit-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        /* Loading */
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-top: 1rem;
            color: var(--grey-400);
            font-size: 0.75rem;
        }

        .loading.active { display: flex; }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--grey-200);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ══════════════════════════════
           TOAST NOTIFICATION
        ══════════════════════════════ */
        .message {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            min-width: 270px;
            max-width: 340px;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            background: var(--white);
            box-shadow: var(--shadow-lg);
            display: none;
            z-index: 9999;
        }

        @keyframes toastSlide {
            from { opacity: 0; transform: translateX(110%) scale(0.9); }
            to   { opacity: 1; transform: translateX(0)   scale(1);   }
        }

        .message.success {
            display: block;
            border-left: 4px solid var(--wa-green);
            animation: toastSlide 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .message.error {
            display: block;
            border-left: 4px solid var(--red);
            animation: toastSlide 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .message-icon {
            font-size: 1.1rem;
            margin-bottom: 0.35rem;
        }

        .message.success .message-icon { color: var(--wa-green); }
        .message.error   .message-icon { color: var(--red); }

        .message-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--grey-800);
            margin-bottom: 0.2rem;
        }

        .message-text {
            font-size: 0.75rem;
            color: var(--grey-600);
            line-height: 1.5;
        }

        /* ══════════════════════════════
           RESPONSIVE
        ══════════════════════════════ */
        @media (max-width: 960px) {
            .right { padding: 2.5rem 2.5rem; }
        }

        @media (max-width: 768px) {
            body { overflow: auto; }

            .split {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }

            .left {
                width: 100%;
                padding: 1.5rem 1.5rem;
                flex-direction: row;
                align-items: center;
                justify-content: flex-start;
                gap: 1.25rem;
            }

            .left::after { display: none; }

            .left-top {
                flex-direction: row;
                align-items: center;
                gap: 1.25rem;
            }

            .tagline-block { display: none; }
            .contact-section { display: none; }

            .logo-img { height: 48px; }

            .right {
                flex: 1;
                padding: 2rem 1.5rem;
                align-items: flex-start;
                justify-content: flex-start;
            }

            .form-wrapper { max-width: 100%; }
        }

        @media (max-width: 480px) {
            .right { padding: 1.75rem 1.25rem; }

            .message {
                left: 1rem;
                right: 1rem;
                min-width: unset;
                max-width: unset;
            }
        }
    </style>
</head>
<body>
    <div class="split">

        <!-- ─── LEFT PANEL ─── -->
        <div class="left">
            <div class="left-top">
                <img
                    src="assets/college-logo.png"
                    alt="SSEC Logo"
                    class="logo-img"
                    onerror="this.style.display='none'"
                >
                <div class="tagline-block">
                    <div class="accent-rule"></div>
                    <h1 class="tagline">Receipts,<br><em>Delivered.</em></h1>
                    <p class="tagline-sub">Sree Sakthi Engineering College</p>
                </div>
            </div>

            <div class="contact-section">
                <p class="contact-eyebrow">Facing an issue?</p>
                <div class="contact-items">
                    <div class="contact-link">
                        <span class="contact-icon"><i class="fas fa-user"></i></span>
                        R Mohana Santhiya
                    </div>
                    <a href="tel:+919994369306" class="contact-link">
                        <span class="contact-icon"><i class="fas fa-phone"></i></span>
                        +91 99943 69306
                    </a>
                </div>
            </div>
        </div>

        <!-- ─── RIGHT PANEL ─── -->
        <div class="right">
            <div class="form-wrapper">

                <div class="form-header">
                    <p class="form-eyebrow">Fee Receipt Portal</p>
                    <h2 class="form-title">Send a<br>Receipt</h2>
                </div>

                <form id="uploadForm">

                    <!-- WhatsApp Number -->
                    <div class="form-group">
                        <label class="field-label" for="phoneNumber">WhatsApp Number</label>
                        <div class="phone-wrap">
                            <div class="phone-prefix">
                                <span>🇮🇳</span>
                                <span>+91</span>
                            </div>
                            <input
                                type="text"
                                id="phoneNumber"
                                name="phoneNumber"
                                class="form-input"
                                placeholder="98765 43210"
                                required
                                maxlength="10"
                                autofocus
                            >
                        </div>
                    </div>

                    <!-- PDF Upload -->
                    <div class="form-group">
                        <label class="field-label" for="pdfFile">Fee Receipt PDF</label>
                        <div class="file-zone" id="fileUploadArea">
                            <input
                                type="file"
                                id="pdfFile"
                                name="pdf"
                                class="file-input"
                                accept=".pdf"
                                required
                            >
                            <div class="zone-content">
                                <i class="fas fa-cloud-upload-alt zone-icon icon-default"></i>
                                <i class="fas fa-cloud-arrow-down zone-icon icon-drag"></i>
                                <p class="zone-text">Drop PDF here or click to browse</p>
                                <p class="zone-hint">PDF only &middot; Max 5MB</p>
                            </div>
                        </div>

                        <div class="file-selected" id="fileSelected">
                            <i class="fas fa-file-pdf pdf-icon"></i>
                            <div class="file-info">
                                <div class="file-name" id="fileName"></div>
                                <div class="file-size" id="fileSize"></div>
                            </div>
                            <button type="button" class="remove-file" id="removeFile">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <i class="fas fa-paper-plane"></i>
                        <span>Send Receipt</span>
                    </button>

                    <!-- Loading -->
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <span>Sending receipt...</span>
                    </div>

                </form>
            </div>
        </div>

    </div>

    <!-- Toast Notification (fixed, top-right) -->
    <div class="message" id="message"></div>

    <script src="app.js"></script>
</body>
</html>
